name: Run WebGPU Primitives Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python (for simple_cors_server.py)
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install dependencies
      run: |
        npm install
        npm install puppeteer

    - name: Run Headless WebGPU Tests
      run: node misc/run_headless_tests.js

    - name: Run Node.js WebGPU Regression Tests
      run: npm run test:node

    - name: Run WGSL Functions Subgroup Emulation Tests
      run: npm run test:wgsl
